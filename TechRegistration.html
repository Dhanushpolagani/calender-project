<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <form>

        <h2>Personal Information</h2>

        <label>Full Name</label>
        <input type="text" placeholder="Enter Full Name" required>

        <label>User Name</label>
        <input type="text" placeholder="Enter User Name" required>

        <label>Password</label>
        <input type="password" placeholder="Create Password" required>

        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm Password" required>

        <label>Email Address</label>
        <input type="email" placeholder="example@gmail.com" required>

        <label>Phone Number</label>
        <input type="tel" placeholder="+91 9876543210">

        <label>Personal Website</label>
        <input type="url" placeholder="https://example.com">

        <label>Date of Birth</label>
        <input type="date">

        <label>Registration Time</label>
        <input type="time" required>

        <label>Preferred Interview Month</label>
        <input type="month" required>

        <label>Preferred Joining Week</label>
        <input type="week" required>

        <label>Registration Date & Time</label>
        <input type="datetime-local" required>

        <label>Age</label>
        <input type="number" min="18" max="100">

        <label for="color">Favourite Color</label>
<input type="color" id="color" name="favoriteColor">

        <label>Experience (Years)</label>
        <input type="number" min="0" max="20" value="5">

        <h2>Address</h2>

        <label>Address Line 1</label>
        <input type="text" placeholder="Address Line 1">

        <label>Address Line 2</label>
        <input type="text" placeholder="Address Line 2">

        <label>State</label>
        <input type="text" placeholder="State">

        <label>City</label>
        <input type="text" placeholder="City">

        <label>Country</label>
        <input type="text" placeholder="Country">

        <label>Zip Code</label>
        <input type="number" placeholder="Zip Code">

        <h2>Professional Experience</h2>

        <label>Current Company</label>
        <input type="text" name="company" required minlength="3" maxlength="50">

        <label>Job Title</label>
        <input type="text" name="jobTitle" required minlength="2" maxlength="50">

        <label>Annual Salary</label>
        <input type="number" name="salary" min="100000" max="100000000" required>

        <label>Resume Upload (PDF/DOC/DOCX)</label>
        <input type="file" accept=".pdf,.doc,.docx">

        <label>Profile Photo (JPG/PNG)</label>
        <input type="file" accept=".jpg,.jpeg,.png">

        <h2>Skills</h2>

        <div class="checkbox-group">
            <label><input type="checkbox" name="skills"> HTML</label>
            <label><input type="checkbox" name="skills"> CSS</label>
            <label><input type="checkbox" name="skills"> JavaScript</label>
            <label><input type="checkbox" name="skills"> TypeScript</label>
            <label><input type="checkbox" name="skills"> Angular</label>
            <label><input type="checkbox" name="skills"> React</label>
            <label><input type="checkbox" name="skills"> Vue</label>
            <label><input type="checkbox" name="skills"> Node.js</label>
            <label><input type="checkbox" name="skills"> Express</label>
            <label><input type="checkbox" name="skills"> MongoDB</label>
            <label><input type="checkbox" name="skills"> PostgreSQL</label>
            <label><input type="checkbox" name="skills"> Docker</label>
        </div>

        <h2>Gender</h2>

        <div class="radio-group">
            <label><input type="radio" name="gender" required> Male</label>
            <label><input type="radio" name="gender"> Female</label>
            <label><input type="radio" name="gender"> Other</label>
            <label><input type="radio" name="gender"> Prefer Not to Say</label>
        </div>

        <label>Preferred Department</label>
        <select required>
            <option value="">Select Department</option>
            <option>Frontend</option>
            <option>Backend</option>
            <option>Full Stack</option>
            <option>UI/UX</option>
            <option>DevOps</option>
            <option>QA</option>
            <option>AI/ML</option>
            <option>Data Science</option>
        </select>

        <h2>Work Mode</h2>

        <div class="radio-group">
            <label><input type="radio" name="mode" required> WFH</label>
            <label><input type="radio" name="mode"> Hybrid</label>
            <label><input type="radio" name="mode"> Office</label>
        </div>

        <label>Languages</label>
        <select required>
            <option value="">Select Language</option>
            <option>English</option>
            <option>Tamil</option>
            <option>Hindi</option>
            <option>Telugu</option>
            <option>Malayalam</option>
            <option>Kannada</option>
            <option>French</option>
            <option>German</option>
            <option>Japanese</option>
        </select>

        <h2>Emergency Contact</h2>

        <label>Contact Person</label>
        <input type="text" required minlength="3" maxlength="40" pattern="[A-Za-z ]+">

        <label>Relationship</label>
        <input type="text" required minlength="2" maxlength="20" pattern="[A-Za-z ]+">

        <label>Mobile Number</label>
        <input type="tel" required pattern="[6-9][0-9]{9}" placeholder="9876543210">

        <h2>Security Question</h2>

        <label>Security Question</label>
        <select required>
            <option value="">Select Question</option>
            <option>Your first school?</option>
            <option>Your favorite teacher?</option>
            <option>Your childhood nickname?</option>
            <option>Your favorite movie?</option>
        </select>

        <label>Answer</label>
        <input type="text" required minlength="3" maxlength="50">

        <h2>Social Links</h2>

        <label>LinkedIn</label>
        <input type="url">

        <label>GitHub</label>
        <input type="url">

        <label>Twitter/X</label>
        <input type="url">

        <label>Biography</label>
        <textarea rows="5" maxlength="500" placeholder="Maximum 500 characters"></textarea>

        <div class="checkbox-group">
            <label><input type="checkbox" required> Agree Terms</label>
            <label><input type="checkbox" required> Agree Privacy</label>
            <label><input type="checkbox"> Email Notifications</label>
        </div>

        <div class="buttons">
            <button type="submit" class="register">Register</button>
            <button type="reset" class="reset">Reset</button>
            <button type="button" class="save">Save Draft</button>
            <button type="button" class="cancel">Cancel</button>
        </div>

    </form>

</body>

</html>
